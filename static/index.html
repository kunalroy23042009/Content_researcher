<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Content Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color Palette - Refined for accessibility and visual hierarchy */
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --primary-color: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary-color: #8b5cf6;
            --accent-color: #a855f7;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            
            /* Neutral Colors */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            
            /* Spacing System - 4px grid */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.15);
            
            /* Transitions */
            --transition-fast: 150ms ease;
            --transition-base: 200ms ease;
            --transition-slow: 300ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: var(--space-6);
            line-height: 1.6;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--space-4);
        }

        .header {
            text-align: center;
            padding: var(--space-12) 0;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-3);
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .header p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            margin-bottom: var(--space-8);
            animation: fadeInUp 0.6s ease-out;
            box-shadow: var(--shadow-lg);
            transition: transform var(--transition-slow), box-shadow var(--transition-slow);
        }

        .section:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .section h2 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: var(--space-6);
            color: var(--primary-light);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            letter-spacing: -0.01em;
        }

        .section h2::before {
            content: '';
            width: 4px;
            height: 32px;
            background: var(--primary-gradient);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .input-group {
            margin-bottom: var(--space-5);
        }

        label {
            display: block;
            margin-bottom: var(--space-2);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
            letter-spacing: -0.005em;
        }

        input[type="text"] {
            width: 100%;
            padding: var(--space-4) var(--space-5);
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all var(--transition-base);
            font-family: inherit;
            min-height: 52px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        button {
            padding: var(--space-4) var(--space-8);
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all var(--transition-base);
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            min-height: 52px;
            letter-spacing: -0.005em;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5);
        }

        button:hover::before {
            opacity: 1;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-indicator {
            display: none;
            color: var(--primary-light);
            font-style: italic;
            margin-left: var(--space-4);
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
            font-weight: 500;
        }

        .error-message {
            color: var(--error-color);
            font-weight: 500;
            margin-top: var(--space-4);
            padding: var(--space-4);
            background: rgba(239, 68, 68, 0.1);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--error-color);
            display: none;
            font-size: 0.95rem;
        }

        #profile-output {
            margin-top: var(--space-6);
            padding: var(--space-6);
            background: rgba(99, 102, 241, 0.08);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        #profile-output h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--space-5);
            color: var(--primary-light);
        }

        #profile-output h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: var(--space-4);
            color: var(--primary-light);
        }

        #profile-output p {
            margin-bottom: var(--space-3);
            line-height: 1.7;
            color: var(--text-secondary);
        }

        #profile-output strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .competitor-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--space-4);
            margin-top: var(--space-5);
        }

        .competitor-item {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-md);
            padding: var(--space-5);
            transition: all var(--transition-base);
            cursor: pointer;
        }

        .competitor-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        .competitor-item input[type="checkbox"] {
            margin-right: var(--space-3);
            accent-color: var(--primary-color);
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .competitor-item label {
            display: inline;
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .insight-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(139, 92, 246, 0.15) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: var(--space-6);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-8);
            box-shadow: var(--shadow-lg);
        }

        .insight-box h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: var(--space-5);
            color: var(--primary-light);
        }

        .insight-box p {
            margin-bottom: var(--space-4);
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .insight-box ul {
            list-style: none;
            padding-left: 0;
        }

        .insight-box li {
            padding: var(--space-3) 0;
            padding-left: var(--space-6);
            position: relative;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .insight-box li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: var(--primary-light);
            font-size: 1.2rem;
        }

        .content-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--space-6);
            margin-top: var(--space-6);
        }

        .content-column {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            transition: all var(--transition-base);
        }

        .content-column:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .content-column h3 {
            margin: 0 0 var(--space-5) 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-light);
            padding-bottom: var(--space-4);
            border-bottom: 2px solid rgba(99, 102, 241, 0.3);
        }

        .content-item {
            margin-bottom: var(--space-4);
            padding: var(--space-5);
            background: rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .content-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .content-item a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            display: block;
            margin-bottom: var(--space-2);
            transition: color var(--transition-fast);
        }

       .content-item a:hover {
            color: var(--accent-color);
        }

        .content-item p {
            margin: var(--space-1) 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .content-results {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: var(--space-4);
            }

            .container {
                padding: 0;
            }

            .header {
                padding: var(--space-8) 0;
            }

            .section {
                padding: var(--space-6);
                border-radius: var(--radius-lg);
            }

            .content-results {
                grid-template-columns: 1fr;
                gap: var(--space-4);
            }

            .competitor-list {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .section {
                padding: var(--space-5);
            }

            #profile-output {
                padding: var(--space-5);
            }

            .content-column {
                padding: var(--space-5);
            }
        }

        /* Accessibility Improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus styles for keyboard navigation */
        button:focus-visible,
        input:focus-visible,
        .competitor-item input:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .section {
                border: 2px solid var(--text-primary);
            }

            button {
                border: 2px solid var(--text-primary);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Creator Content Radar</h1>
            <p>AI-Powered YouTube Channel Analysis & Content Discovery</p>
        </div>

        <section class="section" id="section-analyze-channel">
            <h2>🎯 Analyze YouTube Channel</h2>
            <form id="analyze-form">
                <div class="input-group">
                    <label for="channel-url">YouTube Channel URL or ID</label>
                    <input type="text" id="channel-url" placeholder="https://www.youtube.com/channel/UC... or @handle" required>
                </div>
                <button type="submit">Analyze Channel</button>
                <span id="analyze-loading" class="loading-indicator">Analyzing channel...</span>
                <div id="analyze-error" class="error-message"></div>
            </form>
            <div id="profile-output"></div>
        </section>

        <section class="section" id="section-find-competitors" style="display: none;">
            <h2>🔍 Find Competitors</h2>
            <p style="color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">Select competitors to include in your topic search:</p>
            <div id="competitors-loading" class="loading-indicator">Finding competitors...</div>
            <div id="competitors-error" class="error-message"></div>
            <div id="competitors-output" class="competitor-list"></div>
        </section>

        <section class="section" id="section-search-topic" style="display: none;">
            <h2>🚀 Search Topic</h2>
            <form id="search-form">
                <div class="input-group">
                    <label for="search-topic">Topic to Search</label>
                    <input type="text" id="search-topic" placeholder="e.g., 'video editing tips'" required>
                </div>
                <button type="submit">Search Content</button>
                <span id="search-loading" class="loading-indicator">Searching content...</span>
                <div id="search-error" class="error-message"></div>
            </form>
            <div id="search-results-output"></div>
        </section>
    </div>

    <script>
        let currentChannelId = null;

        function setLoading(elementId, isLoading, errorMessage = '') {
            document.getElementById(elementId + '-loading').style.display = isLoading ? 'inline' : 'none';
            document.getElementById(elementId + '-error').textContent = errorMessage;
            document.getElementById(elementId + '-error').style.display = errorMessage ? 'block' : 'none';
        }

        document.getElementById('analyze-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const channelUrl = document.getElementById('channel-url').value;
            setLoading('analyze', true);

            try {
                const response = await fetch('/analyze-channel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_url: channelUrl })
                });
                const data = await response.json();

                if (response.ok) {
                    currentChannelId = data.channel_id;
                    document.getElementById('profile-output').innerHTML = `
                        <h3>📊 Channel Profile: ${data.title}</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0;">
                            <div style="background: rgba(102, 126, 234, 0.15); padding: 15px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">👥 Subscribers</div>
                                <div style="font-size: 1.3rem; font-weight: 700; color: #667eea;">${data.subscriber_count.toLocaleString()}</div>
                            </div>
                            <div style="background: rgba(118, 75, 162, 0.15); padding: 15px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">📺 Total Videos</div>
                                <div style="font-size: 1.3rem; font-weight: 700; color: #764ba2;">${data.video_count.toLocaleString()}</div>
                            </div>
                            <div style="background: rgba(102, 126, 234, 0.15); padding: 15px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">👁️ Total Views</div>
                                <div style="font-size: 1.3rem; font-weight: 700; color: #667eea;">${data.view_count.toLocaleString()}</div>
                            </div>
                            <div style="background: rgba(118, 75, 162, 0.15); padding: 15px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">📈 Avg Views/Video</div>
                                <div style="font-size: 1.3rem; font-weight: 700; color: #764ba2;">${data.average_views_per_video.toLocaleString()}</div>
                            </div>
                            <div style="background: rgba(102, 126, 234, 0.15); padding: 15px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">💬 Engagement Rate</div>
                                <div style="font-size: 1.3rem; font-weight: 700; color: #667eea;">${data.engagement_rate.toFixed(2)}%</div>
                            </div>
                            <div style="background: rgba(118, 75, 162, 0.15); padding: 15px; border-radius: 10px; text-align: center;">
                                <div style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">🏆 Channel Tier</div>
                                <div style="font-size: 1.3rem; font-weight: 700; color: #764ba2;">${data.channel_tier}</div>
                            </div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 15px;">
                            <h4 style="color: #667eea; margin-bottom: 15px;">🎯 Channel Analysis</h4>
                            <p><strong>Niche:</strong> ${data.niche}</p>
                            <p><strong>Topics:</strong> ${data.topics.join(', ')}</p>
                            <p><strong>Content Style:</strong> ${data.content_style}</p>
                            <p><strong>Target Audience:</strong> ${data.target_audience}</p>
                            <p><strong>Upload Frequency:</strong> ${data.upload_frequency}</p>
                            <p><strong>Growth Potential:</strong> ${data.growth_potential}</p>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 15px;">
                            <h4 style="color: #764ba2; margin-bottom: 15px;">🤖 AI Summary</h4>
                            <p>${data.ai_summary}</p>
                        </div>
                        <div style="background: rgba(102, 126, 234, 0.1); padding: 20px; border-radius: 12px; margin-bottom: 15px;">
                            <h4 style="color: #667eea; margin-bottom: 15px;">💡 Content Recommendations</h4>
                            <ul style="list-style: none; padding: 0;">
                                ${data.content_recommendations.map(rec => `<li style="padding: 8px 0; padding-left: 25px; position: relative;">✨ ${rec}</li>`).join('')}
                            </ul>
                        </div>
                        <div style="background: rgba(118, 75, 162, 0.1); padding: 20px; border-radius: 12px;">
                            <h4 style="color: #764ba2; margin-bottom: 15px;">🚀 Optimization Tips</h4>
                            <ul style="list-style: none; padding: 0;">
                                ${data.optimization_tips.map(tip => `<li style="padding: 8px 0; padding-left: 25px; position: relative;">⚡ ${tip}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                    document.getElementById('section-find-competitors').style.display = 'block';
                    findCompetitors(currentChannelId);
                } else {
                    setLoading('analyze', false, data.detail || 'An unknown error occurred.');
                }
            } catch (error) {
                setLoading('analyze', false, 'Network error or server unreachable.');
                console.error('Analyze channel error:', error);
            } finally {
                setLoading('analyze', false);
            }
        });

        async function findCompetitors(channelId) {
            setLoading('competitors', true);
            document.getElementById('competitors-output').innerHTML = '';

            try {
                const response = await fetch('/find-competitors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_id: channelId })
                });
                const data = await response.json();

                if (response.ok) {
                    if (data.length > 0) {
                        const competitorListHtml = data.map(comp => `
                            <div class="competitor-item">
                                <input type="checkbox" class="competitor-checkbox" value="${comp.channel_id}" checked>
                                <label>${comp.title}</label>
                                <p style="margin: 5px 0 0 0; color: rgba(255,255,255,0.6); font-size: 0.85rem;">${comp.relevance_note}</p>
                            </div>
                        `).join('');
                        document.getElementById('competitors-output').innerHTML = competitorListHtml;
                        document.getElementById('section-search-topic').style.display = 'block';
                    } else {
                        document.getElementById('competitors-output').innerHTML = '<p style="color: rgba(255,255,255,0.7);">No competitors found.</p>';
                    }
                } else {
                    setLoading('competitors', false, data.detail || 'An unknown error occurred.');
                }
            } catch (error) {
                setLoading('competitors', false, 'Network error or server unreachable.');
                console.error('Find competitors error:', error);
            } finally {
                setLoading('competitors', false);
            }
        }

        document.getElementById('search-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const topic = document.getElementById('search-topic').value;
            const selectedCompetitors = Array.from(document.querySelectorAll('.competitor-checkbox:checked'))
                                            .map(cb => cb.value);
            setLoading('search', true);
            document.getElementById('search-results-output').innerHTML = '';

            try {
                const response = await fetch('/search-topic', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        channel_id: currentChannelId,
                        topic: topic,
                        competitor_channel_ids: selectedCompetitors
                    })
                });
                const data = await response.json();

                if (response.ok) {
                    const insight = data.insight;
                    const results = data.results;

                    let outputHtml = `
                        <div class="insight-box">
                            <h3>💡 AI Insight for '${topic}'</h3>
                            <p><strong>📋 Summary:</strong> ${insight.summary}</p>
                            <p><strong>🎯 Content Angles:</strong></p>
                            <ul>
                                ${insight.content_angles.map(angle => `<li>${angle}</li>`).join('')}
                            </ul>
                            ${insight.content_gap ? `<p><strong>🔍 Content Gap:</strong> ${insight.content_gap}</p>` : ''}
                        </div>
                        <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: #667eea;">📺 Content Results</h3>
                        <div class="content-results">
                    `;

                    const groupedResults = {
                        trending: [],
                        popular: [],
                        underrated: []
                    };

                    results.forEach(item => {
                        if (groupedResults[item.classification]) {
                            groupedResults[item.classification].push(item);
                        }
                    });

                    for (const classification in groupedResults) {
                        const title = classification.charAt(0).toUpperCase() + classification.slice(1);
                        const emoji = classification === 'trending' ? '🔥' : classification === 'popular' ? '⭐' : '💎';
                        outputHtml += `
                            <div class="content-column">
                                <h3>${emoji} ${title}</h3>
                                ${groupedResults[classification].length > 0 ?
                                    groupedResults[classification].map(item => `
                                        <div class="content-item">
                                            <a href="${item.url}" target="_blank">${item.title}</a>
                                            <p>📺 Source: ${item.source}</p>
                                            <p>📊 Engagement: ${item.engagement_score.toFixed(2)}</p>
                                        </div>
                                    `).join('')
                                    : '<p style="color: rgba(255,255,255,0.5);">No results for this category.</p>'
                                }
                            </div>
                        `;
                    }

                    outputHtml += `</div>`;
                    document.getElementById('search-results-output').innerHTML = outputHtml;

                } else {
                    setLoading('search', false, data.detail || 'An unknown error occurred.');
                }
            } catch (error) {
                setLoading('search', false, 'Network error or server unreachable.');
                console.error('Search topic error:', error);
            } finally {
                setLoading('search', false);
            }
        });
    </script>
</body>
</html>
